<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/head :: common-head}"></div>
    <title th:text="${group.name} + ' - Chi tiết'">Chi tiết nhóm</title>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="flex">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        
        <main class="lg:ml-64 flex-1 p-8">
            <div class="mb-8">
                <h1 class="text-3xl font-black text-slate-900" th:text="${group.name}">Tên chuyến đi</h1>
                <p class="text-slate-500">Quản lý chi tiêu và thành viên nhóm</p>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-gutter max-w-7xl mx-auto">

                <section class="xl:col-span-3 flex flex-col gap-lg">
                    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-teal-500">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="font-bold text-lg text-slate-800">Thành viên</h3>
                            <span class="bg-teal-50 text-teal-700 px-2 py-1 rounded-md text-xs font-bold" 
                                  th:text="${members.size()} + ' Người'">0 Active</span>
                        </div>
                        
                        <div class="flex flex-col gap-4 mb-8">
						    <div th:each="m : ${members}" class="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-lg transition-colors group relative">
						        <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-600 uppercase"
						             th:text="${#strings.substring(m.name,0,1)}">U</div>
						        
						        <span class="font-medium text-slate-700" th:text="${m.name}">Tên thành viên</span>
						
						        <div class="ml-auto flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
						            <button type="button"
									        th:data-id="${m.id}"
									        th:data-name="${m.name}"
									        onclick="openEditMemberModal(this)" 
									        class="p-1.5 text-slate-400 hover:text-teal-600 hover:bg-teal-50 rounded-md transition-all">
									    <span class="material-symbols-outlined text-[20px]">edit_square</span>
									</button>
						            
						            <form th:action="@{/group/{groupId}/delete-member/{memberId}(groupId=${group.id}, memberId=${m.id})}" 
						                  method="post" onsubmit="return confirm('Bạn có chắc chắn muốn xóa thành viên này? Toàn bộ hóa đơn liên quan sẽ bị ảnh hưởng!')">
						                <button type="submit" class="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-all">
						                    <span class="material-symbols-outlined text-[20px]">delete</span>
						                </button>
						            </form>
						        </div>
						    </div>
						</div>

                        <form th:action="@{/group/{id}/add-member(id=${group.id})}" method="post" class="relative">
                            <input name="memberName" required class="w-full bg-slate-50 border-none rounded-xl py-3 pl-4 pr-12 text-sm focus:ring-2 focus:ring-teal-500 transition-all" 
                                   placeholder="Thêm tên..." type="text"/>
                            <button type="submit" class="absolute right-2 top-1.5 w-8 h-8 bg-teal-600 text-white rounded-lg flex items-center justify-center hover:bg-teal-700 transition-all">
                                <span class="material-symbols-outlined text-sm">add</span>
                            </button>
                        </form>
                    </div>
                </section>

                <section class="xl:col-span-5 flex flex-col gap-lg">
                    <div class="bg-white p-8 rounded-xl shadow-sm border-t-8 border-orange-400">
                        <div class="flex items-center gap-4 mb-8">
                            <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center">
                                <span class="material-symbols-outlined text-3xl">receipt_long</span>
                            </div>
                            <h3 class="text-xl font-black text-slate-800">Thêm chi tiêu</h3>
                        </div>
                        
                        <form th:action="@{/group/{id}/add-expense(id=${group.id})}" method="post" class="space-y-6">
                            <div>
                                <label class="block font-bold text-slate-600 mb-2 ml-1 text-sm">Nội dung chi tiêu</label>
                                <div class="relative">
                                    <span class="absolute left-4 top-3.5 text-slate-400 material-symbols-outlined">shopping_bag</span>
                                    <input name="description" required class="w-full bg-slate-50 border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-teal-500 transition-all" 
                                           placeholder="Ví dụ: Ăn tối, Vé xe..." type="text"/>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block font-bold text-slate-600 mb-2 ml-1 text-sm">Số tiền</label>
                                    <div class="relative">
                                        <span class="absolute left-4 top-3.5 text-slate-400 font-bold">VNĐ</span>
                                        <input name="amount" required class="w-full bg-slate-50 border-none rounded-xl py-4 pl-14 pr-4 focus:ring-2 focus:ring-teal-500 font-bold" 
                                               placeholder="0" type="number"/>
                                    </div>
                                </div>
                                <div>
                                    <label class="block font-bold text-slate-600 mb-2 ml-1 text-sm">Người trả</label>
                                    <select name="payerId" class="w-full bg-slate-50 border-none rounded-xl py-4 px-4 focus:ring-2 focus:ring-teal-500 transition-all cursor-pointer">
                                        <option th:each="m : ${members}" th:value="${m.id}" th:text="${m.name}">Thành viên</option>
                                    </select>
                                </div>
                            </div>
                            <div class="pt-4">
                                <button class="w-full bg-teal-600 text-white py-5 rounded-xl font-black text-lg shadow-lg shadow-teal-200 hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                                    <span class="material-symbols-outlined">add_circle</span>
                                     Lưu hóa đơn
                                </button>
                            </div>
                        </form>
                    </div>
                </section>

                <section class="xl:col-span-4 flex flex-col gap-lg">
                    <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500">
                        <h3 class="font-bold text-lg text-slate-800 mb-6">Số dư hiện tại</h3>
                        <div class="space-y-4">
                            <div th:each="entry : ${balances}" class="flex items-center justify-between p-3 rounded-lg bg-slate-50">
                                <div class="flex items-center gap-3">
                                    <span class="font-medium" th:text="${entry.key}">Tên</span>
                                </div>
                                <span th:class="${entry.value >= 0 ? 'text-teal-600 font-bold' : 'text-red-500 font-bold'}"
                                      th:text="${(entry.value > 0 ? '+' : '') + #numbers.formatDecimal(entry.value, 0, 0)}">
                                    +0
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-sm flex-1 overflow-hidden flex flex-col border-l-4 border-slate-300">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="font-bold text-lg text-slate-800">Lịch sử chi tiêu</h3>
                        </div>
                        <div class="space-y-4 overflow-y-auto pr-2">
                            <div th:each="exp : ${expenses}" class="flex items-center gap-4 p-4 border border-slate-100 rounded-xl bg-white group">
                                <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center shrink-0">
                                    <span class="material-symbols-outlined text-slate-400">payments</span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-bold text-slate-800 truncate" th:text="${exp.description}">Nội dung</h4>
                                    <p class="text-xs text-slate-500">
                                        <span th:text="${#numbers.formatDecimal(exp.amount, 0, 0)}">0</span> bởi 
                                        <span class="font-bold text-teal-600" th:text="${exp.payer.name}">Người trả</span>
                                    </p>
                                </div>
                                <div class="text-right shrink-0">
					                <p class="text-[15px] uppercase font-bold text-slate-400" 
					                   th:text="${#temporals.format(exp.createAt, 'dd/MM/yyyy')}">30/04/2026</p>
					                <p class="text-[15px] text-slate-300" 
					                   th:text="${#temporals.format(exp.createAt, 'HH:mm')}">12:00</p>
					            </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <div id="editMemberModal" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-black/50 backdrop-blur-sm">
	    <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
	        <h3 class="text-lg font-bold mb-4">Đổi tên thành viên</h3>
	        <form th:action="@{/group/{id}/edit-member(id=${group.id})}" method="post">
	            <input type="hidden" id="editMemberId" name="memberId">
	            <input type="text" id="editMemberName" name="newName" required 
	                   class="w-full rounded-xl border-slate-200 focus:ring-teal-500 mb-4">
	            <div class="flex gap-3">
	                <button type="button" onclick="closeEditModal()" class="flex-1 py-2 bg-slate-100 rounded-lg font-bold">Hủy</button>
	                <button type="submit" class="flex-1 py-2 bg-teal-600 text-white rounded-lg font-bold">Lưu</button>
	            </div>
	        </form>
	    </div>
	</div>
<script>
    function openEditMemberModal(button) {
        // Lấy dữ liệu từ thuộc tính data- của nút được bấm
        const id = button.getAttribute('data-id');
        const name = button.getAttribute('data-name');

        // Điền vào form trong modal
        document.getElementById('editMemberId').value = id;
        document.getElementById('editMemberName').value = name;

        // Hiện modal
        document.getElementById('editMemberModal').classList.remove('hidden');
    }

    function closeEditModal() {
        document.getElementById('editMemberModal').classList.add('hidden');
    }
</script>
</body>
</html>
