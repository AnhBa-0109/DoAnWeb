<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - BeFair</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-teal-600 mb-2">BeFair</h1>
            <p class="text-slate-400 font-medium">Tạo tài khoản để bắt đầu chia tiền sòng phẳng nào!</p>
        </div>

        <form th:action="@{/register}" method="post" class="space-y-4">
            <div th:if="${error}" class="p-3 bg-red-50 text-red-500 text-xs rounded-xl border border-red-100 italic" th:text="${error}"></div>
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Tên của bạn</label>
                <input type="text" name="fullName" required placeholder="Nguyễn Văn A"
                       class="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-teal-500 transition-all outline-none">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Tên đăng nhập</label>
                <input type="text" name="username" required placeholder="username123"
                       class="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-teal-500 transition-all outline-none">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Mật khẩu</label>
                <input type="password" name="password" required placeholder="••••••••"
                       class="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-teal-500 transition-all outline-none">
            </div>

            <button type="submit" class="w-full bg-teal-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-teal-200 hover:bg-teal-700 transition-all mt-4">
                TẠO TÀI KHOẢN
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-500">
            Đã có tài khoản? <a href="/login" class="text-teal-600 font-bold hover:underline">Đăng nhập ngay</a>
        </p>
    </div>
</body>
</html>
