<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>
<div th:replace="~{fragments/head :: common-head}"></div>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-teal-600 mb-2">BeFair</h1>
            <p class="text-slate-400 font-medium">Chào mừng bạn quay trở lại!</p>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-5">
            <div th:if="${param.error}" class="p-3 bg-red-50 text-red-500 text-xs rounded-xl border border-red-100 italic">
                Sai tài khoản hoặc mật khẩu rồi bạn ơi!
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Tên đăng nhập</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-teal-500 transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Mật khẩu</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-teal-500 transition-all">
            </div>

            <button type="submit" class="w-full bg-teal-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-teal-200 hover:bg-teal-700 transition-all">
                ĐĂNG NHẬP NGAY
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-500">
            Chưa có tài khoản? <a href="/register" class="text-teal-600 font-bold hover:underline">Đăng ký ngay</a>
        </p>
    </div>
</body>
</html>
