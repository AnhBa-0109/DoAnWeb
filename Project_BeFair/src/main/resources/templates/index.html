<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/head :: common-head}"></div>
    <title>Be Fair!</title>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div th:replace="~{fragments/header :: header}"></div>
        <main class="w-full max-w-7xl p-margin">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <h1 class="text-4xl font-black text-slate-900 mb-2">Các nhóm của tôi</h1>
                    <p class="text-slate-500">Tiền bạc sòng phẳng - Không lo mất bạn</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                
	            <div th:each="g : ${groups}" class="group relative rounded-3xl bg-white border border-slate-100 p-6 shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-300">
				    <div class="flex justify-between items-start mb-6">
				        <div class="w-12 h-12 rounded-2xl bg-teal-50 text-teal-600 flex items-center justify-center group-hover:bg-teal-500 group-hover:text-white transition-all shadow-inner">
				            <span class="material-symbols-outlined">explore</span>
				        </div>
				        
				        <form th:action="@{/group/delete/{id}(id=${g.id})}" method="post">
				            <button type="submit" class="p-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all">
				                <span class="material-symbols-outlined text-lg">delete_sweep</span>
				            </button>
				        </form>
				    </div>
				
				    <h3 class="text-xl font-black text-slate-800 mb-2 group-hover:text-teal-600 transition-colors" th:text="${g.name}">Trip Name</h3>
				    
				    <div class="flex items-center gap-3 mb-6">
					    <div class="flex -space-x-2">
					        <div th:each="m, iterStat : ${g.members}" 
							     th:if="${iterStat.index < 3}"
							     class="w-8 h-8 rounded-full border-2 border-white bg-teal-100 flex items-center justify-center text-xs font-black text-teal-700 uppercase shadow-sm leading-none pb-[2px]"
							     th:with="nameArr=${#strings.arraySplit(m.name, ' ')}"
							     th:text="${#strings.substring(nameArr[#arrays.length(nameArr) - 1], 0, 1)}">
							    A
							</div>
					        
					        <div th:if="${g.members.size() > 3}" 
					             class="w-8 h-8 rounded-full border-2 border-white bg-slate-100 flex items-center justify-center text-[10px] font-black text-slate-500 shadow-sm"
					             th:text="'+' + ${g.members.size() - 3}">+</div>
					    </div>
					    <span class="text-xs font-bold text-slate-400" th:text="|${g.members != null ? g.members.size() : 0} thành viên|"></span>
					</div>
				
				    <a th:href="@{'/group/' + ${g.id}}" class="flex items-center justify-center gap-2 py-3 w-full bg-slate-900 text-white rounded-2xl font-bold hover:bg-teal-600 transition-all shadow-lg shadow-slate-200">
				        <span>Chi tiết</span>
				        <span class="material-symbols-outlined text-sm">open_in_new</span>
				    </a>
				</div>

                <div onclick="openModal()" class="border-2 border-dashed border-slate-200 rounded-2xl p-6 flex flex-col items-center justify-center text-center group cursor-pointer hover:border-teal-500 transition-colors">
                    <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mb-4 group-hover:bg-teal-500 transition-colors">
                        <span class="material-symbols-outlined text-slate-400 group-hover:text-white">add</span>
                    </div>
                    <h4 class="font-bold text-slate-500 group-hover:text-teal-600">Thêm nhóm mới</h4>
                </div>

            </div>
        </main>
    <div id="addGroupModal" class="hidden fixed inset-0 z-[60] overflow-y-auto">
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm transition-opacity"></div>

    <div class="flex min-h-full items-center justify-center p-4">
        <div class="relative w-full max-w-md transform overflow-hidden rounded-2xl bg-white p-6 shadow-2xl transition-all">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-slate-900">Tạo chuyến đi mới</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form th:action="@{/add-group}" method="post">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Tên nhóm / Chuyến đi</label>
                        <input type="text" name="name" required
                               placeholder="Ví dụ: Đà Lạt 2024, Nhậu cuối tuần..."
                               class="w-full rounded-xl border-slate-200 focus:border-teal-500 focus:ring-teal-500">
                    </div>
                </div>

                <div class="mt-8 flex gap-3">
                    <button type="button" onclick="closeModal()"
                            class="flex-1 px-4 py-3 rounded-xl bg-slate-100 font-bold text-slate-600 hover:bg-slate-200 transition-all">
                        Hủy
                    </button>
                    <button type="submit"
                            class="flex-1 px-4 py-3 rounded-xl bg-teal-500 font-bold text-white hover:bg-teal-600 shadow-lg shadow-teal-200 transition-all">
                        Tạo ngay
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    function openModal() {
        document.getElementById('addGroupModal').classList.remove('hidden');
    }
    function closeModal() {
        document.getElementById('addGroupModal').classList.add('hidden');
    }
    
    // Đóng khi click ngoài vùng modal
    window.onclick = function(event) {
        let modal = document.getElementById('addGroupModal');
        if (event.target == modal.querySelector('.bg-black\\/50')) {
            closeModal();
        }
    }
</script>
</body>
</html>
